# =============================================================================
# EduShift - override de desarrollo
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Diferencias vs base:
#   - PostgreSQL y Redis exponen puertos al host
#   - Redis sin password (override del command y healthcheck)
#   - backend con perfil dev, SQL logging y puerto de debug JDWP
# =============================================================================

services:

  postgres:
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edushift}

  redis:
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-128mb}"
      - "--maxmemory-policy"
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_TESTS: "true"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_CONTEXT_PATH: /api
      DB_PASSWORD: ${DB_PASSWORD:-edushift}
      DB_SSL_MODE: disable
      REDIS_PASSWORD: ""
      REDIS_SSL_ENABLED: "false"
      # Frontend / CORS (defaults dev)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:4200,http://localhost:4201}
      # JWT (override permitido por .env)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (openssl rand -base64 48)}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-1h}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      # Logging
      SQL_LOGGING_ENABLED: "true"
      SQL_LOGGING_LEVEL: DEBUG
      APP_LOG_LEVEL: DEBUG
      FLYWAY_LOG_LEVEL: DEBUG
      HIKARI_MINIMUM_IDLE: 2
      HIKARI_MAXIMUM_POOL_SIZE: 5
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
      - "${DEBUG_PORT:-5005}:5005"
