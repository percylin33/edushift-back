# Simulación local de Render (sin Redis, perfil prod)
# Se importa con --spring.config.import=optional:file:./.render-sim.properties

SPRING_PROFILES_ACTIVE=prod
SERVER_PORT=8080

# --- Postgres (docker-compose dev) ---
SPRING_DATASOURCE_URL=
DB_HOST=localhost
DB_PORT=5432
DB_NAME=edushift
DB_SCHEMA=edushift
DB_USER=edushift
DB_PASSWORD=edushift
DB_SSL_MODE=disable
DB_APPLICATION_NAME=edushift-back

# --- Redis desactivado: excluimos autoconfiguración ---
SPRING_AUTOCONFIGURE_EXCLUDES=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
REDIS_ENABLED=false
REDIS_HOST=
REDIS_PORT=
REDIS_PASSWORD=
REDIS_SSL_ENABLED=false
SPRING_DATA_REDIS_URL=

# --- Pool más bajo porque es local ---
HIKARI_MINIMUM_IDLE=2
HIKARI_MAXIMUM_POOL_SIZE=5

# --- Flyway ---
FLYWAY_LOG_LEVEL=INFO

# --- Logging app ---
APP_LOG_LEVEL=INFO
SQL_LOGGING_ENABLED=false
SECURITY_LOG_LEVEL=WARN

# --- Seguridad JWT (Render simulado: secret fijo de dev) ---
JWT_SECRET=dev-render-sim-secret-please-change-32chars-min!!
JWT_ISSUER=edushift
JWT_AUDIENCE=edushift-clients
JWT_ACCESS_TTL=1h
JWT_REFRESH_TTL=30d

# --- URLs app / frontend ---
APP_BASE_URL=http://localhost:8080
FRONTEND_URL=http://localhost:5173
CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:4200

# --- Integraciones: desactivadas en simulación ---
OPENROUTER_ENABLED=false
OPENROUTER_API_KEY=disabled
FIREBASE_ENABLED=false
FIREBASE_PROJECT_ID=disabled

# --- Actuator ---
MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info
