# =============================================================================
# EduShift - configuración común
# Perfiles: application-dev.properties | application-prod.properties
# =============================================================================

spring.application.name=edushift-back
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# -----------------------------------------------------------------------------
# Servidor
# -----------------------------------------------------------------------------
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/api}

# -----------------------------------------------------------------------------
# PostgreSQL (valores por perfil; variables de entorno documentadas abajo)
# -----------------------------------------------------------------------------
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# DB_SCHEMA (opcional, default public)
# DB_SSL_MODE (opcional: disable | prefer | require | verify-full)
# DB_APPLICATION_NAME (opcional, identificador en pg_stat_activity)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# HikariCP - valores base (perfiles dev/prod ajustan el pool)
spring.datasource.hikari.pool-name=${HIKARI_POOL_NAME:EduShiftHikariPool}
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${HIKARI_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.register-mbeans=true

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.generate_statistics=false

# -----------------------------------------------------------------------------
# Flyway (migraciones automáticas al arranque, antes que Hibernate validate)
# -----------------------------------------------------------------------------
# FLYWAY_ENABLED, FLYWAY_SCHEMAS, FLYWAY_DEFAULT_SCHEMA, FLYWAY_CLEAN_DISABLED
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=${FLYWAY_SCHEMAS:edushift}
spring.flyway.default-schema=${FLYWAY_DEFAULT_SCHEMA:edushift}
spring.flyway.create-schemas=true
spring.flyway.table=flyway_schema_history
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=<< EduShift baseline >>
spring.flyway.validate-on-migrate=true
spring.flyway.validate-migration-naming=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true
spring.flyway.clean-on-validation-error=false
spring.flyway.mixed=false
spring.flyway.fail-on-missing-locations=true
spring.flyway.placeholder-replacement=true
spring.flyway.postgresql.transactional-lock=true

# JPA usa el mismo esquema que Flyway
spring.jpa.properties.hibernate.default_schema=${FLYWAY_DEFAULT_SCHEMA:edushift}

# -----------------------------------------------------------------------------
# Redis / Cache
# -----------------------------------------------------------------------------
spring.cache.type=redis
spring.data.redis.repositories.enabled=false

# REDIS_HOST, REDIS_PORT, REDIS_PASSWORD, REDIS_SSL_ENABLED (perfil prod)
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2s}
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:16}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:8}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:2}
spring.data.redis.lettuce.pool.max-wait=${REDIS_POOL_MAX_WAIT:2s}

# EduShift Redis (TTL por dominio; ISO-8601 o unidades: 5m, 1h, 30s)
edushift.redis.enabled=${REDIS_ENABLED:true}
edushift.redis.key-prefix=${REDIS_KEY_PREFIX:edushift:}
edushift.redis.default-ttl=${REDIS_DEFAULT_TTL:10m}
edushift.redis.cache.dashboards.ttl=${CACHE_TTL_DASHBOARDS:5m}
edushift.redis.cache.permissions.ttl=${CACHE_TTL_PERMISSIONS:15m}
edushift.redis.cache.tenant-config.ttl=${CACHE_TTL_TENANT_CONFIG:1h}
edushift.redis.cache.ai-context.ttl=${CACHE_TTL_AI_CONTEXT:30m}

# -----------------------------------------------------------------------------
# Aplicación (frontend / CORS / base URL)
# -----------------------------------------------------------------------------
app.base-url=${APP_BASE_URL:}
app.frontend.url=${FRONTEND_URL:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

# -----------------------------------------------------------------------------
# Seguridad / JWT
# -----------------------------------------------------------------------------
# JWT_SECRET es obligatorio (mín 32 caracteres para HS256). NO usar defaults en prod.
app.security.jwt.secret=${JWT_SECRET:}
app.security.jwt.issuer=${JWT_ISSUER:edushift}
app.security.jwt.audience=${JWT_AUDIENCE:edushift-clients}
app.security.jwt.access-token-ttl=${JWT_ACCESS_TTL:15m}
app.security.jwt.refresh-token-ttl=${JWT_REFRESH_TTL:7d}
app.security.jwt.header=${JWT_HEADER:Authorization}
app.security.jwt.token-prefix=${JWT_TOKEN_PREFIX:Bearer }

# -----------------------------------------------------------------------------
# Integraciones - OpenRouter (módulo AI)
# -----------------------------------------------------------------------------
app.integrations.openrouter.enabled=${OPENROUTER_ENABLED:false}
app.integrations.openrouter.api-key=${OPENROUTER_API_KEY:}
app.integrations.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
app.integrations.openrouter.default-model=${OPENROUTER_DEFAULT_MODEL:openai/gpt-4o-mini}
app.integrations.openrouter.referer=${OPENROUTER_REFERER:}
app.integrations.openrouter.title=${OPENROUTER_TITLE:EduShift}
app.integrations.openrouter.timeout=${OPENROUTER_TIMEOUT:30s}
app.integrations.openrouter.max-retries=${OPENROUTER_MAX_RETRIES:2}

# -----------------------------------------------------------------------------
# Integraciones - Firebase (notificaciones FCM, opcionalmente auth)
# Usar FIREBASE_CREDENTIALS_JSON (raw) o FIREBASE_CREDENTIALS_PATH (archivo montado).
# -----------------------------------------------------------------------------
app.integrations.firebase.enabled=${FIREBASE_ENABLED:false}
app.integrations.firebase.project-id=${FIREBASE_PROJECT_ID:}
app.integrations.firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}
app.integrations.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}
app.integrations.firebase.web-api-key=${FIREBASE_WEB_API_KEY:}
app.integrations.firebase.database-url=${FIREBASE_DATABASE_URL:}
app.integrations.firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET:}

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.db.enabled=true
management.health.redis.enabled=true

# -----------------------------------------------------------------------------
# Logging
# - Patterns, file appenders y routing por categoría se definen en logback-spring.xml.
# - Aquí solo dejamos los knobs por variable de entorno: LOG_PATH, LOG_LEVEL_*.
# -----------------------------------------------------------------------------
# LOG_PATH        : ruta base de archivos (default ./logs)
# LOG_LEVEL_ROOT  : nivel del logger root (default INFO)
# LOG_LEVEL_APP   : nivel del paquete com.edushift (default INFO; DEBUG en dev)
# Categorías expuestas como loggers SLF4J (ver com.edushift.shared.constants.LoggerNames):
#   - edushift.security
#   - edushift.requests
#   - edushift.exceptions
#   - edushift.ai
#   - edushift.audit
logging.config=classpath:logback-spring.xml

spring.output.ansi.enabled=ALWAYS