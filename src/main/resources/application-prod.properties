# =============================================================================
# EduShift - perfil producción
# Requiere variables de entorno para credenciales y host (sin defaults inseguros)
# =============================================================================

# -----------------------------------------------------------------------------
# PostgreSQL - datasource (obligatorio vía entorno)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?currentSchema=${DB_SCHEMA:edushift}&sslmode=${DB_SSL_MODE:require}&ApplicationName=${DB_APPLICATION_NAME:edushift-back}&options=-c%20TimeZone%3DUTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# -----------------------------------------------------------------------------
# HikariCP - pool para producción (ajustar según carga y límites de PostgreSQL)
# -----------------------------------------------------------------------------
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:10}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:30}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.keepalive-time=${HIKARI_KEEPALIVE_TIME:300000}
spring.datasource.hikari.leak-detection-threshold=0
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}

# -----------------------------------------------------------------------------
# JPA - sin logging SQL en producción
# -----------------------------------------------------------------------------
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.highlight_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.generate_statistics=false

logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.flywaydb=INFO
logging.level.com.edushift=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

# -----------------------------------------------------------------------------
# Flyway - producción (sin clean; validación estricta)
# -----------------------------------------------------------------------------
spring.flyway.clean-disabled=true
spring.flyway.clean-on-validation-error=false
spring.flyway.validate-on-migrate=true
spring.flyway.ignore-migration-patterns=*:future
logging.level.org.flywaydb=${FLYWAY_LOG_LEVEL:WARN}

# -----------------------------------------------------------------------------
# Redis - producción
# -----------------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:32}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:16}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:4}

edushift.redis.cache.dashboards.ttl=${CACHE_TTL_DASHBOARDS:3m}
edushift.redis.cache.permissions.ttl=${CACHE_TTL_PERMISSIONS:10m}
edushift.redis.cache.tenant-config.ttl=${CACHE_TTL_TENANT_CONFIG:30m}
edushift.redis.cache.ai-context.ttl=${CACHE_TTL_AI_CONTEXT:15m}

# -----------------------------------------------------------------------------
# Aplicación / Frontend / CORS (prod) - URLs obligatorias
# -----------------------------------------------------------------------------
app.base-url=${APP_BASE_URL}
app.frontend.url=${FRONTEND_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# -----------------------------------------------------------------------------
# Seguridad / JWT (prod) - secreto obligatorio
# -----------------------------------------------------------------------------
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.issuer=${JWT_ISSUER:edushift}
app.security.jwt.audience=${JWT_AUDIENCE:edushift-clients}

# -----------------------------------------------------------------------------
# Integraciones (prod) - sin defaults para credenciales
# -----------------------------------------------------------------------------
app.integrations.openrouter.enabled=${OPENROUTER_ENABLED:true}
app.integrations.openrouter.api-key=${OPENROUTER_API_KEY}

app.integrations.firebase.enabled=${FIREBASE_ENABLED:true}
app.integrations.firebase.project-id=${FIREBASE_PROJECT_ID}

# -----------------------------------------------------------------------------
# Actuator - superficie mínima
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
