# =============================================================================
# EduShift - Bean Validation messages (auto-loaded by Hibernate Validator)
#
# Convenciones:
#   - claves Jakarta estandar: jakarta.validation.constraints.X.message
#   - claves EduShift custom : edushift.validation.X.message
#
# Placeholders:
#   - {min}, {max}        : parametros de @Size, @Min, @Max...
#   - {value}             : valor declarado por la constraint
#   - {values}            : (custom @EnumValue) lista de constantes admitidas
#
# Localizar: crear ValidationMessages_<lang>.properties (es, en, pt...).
# =============================================================================

# -----------------------------------------------------------------------------
# Jakarta Bean Validation - overrides (mensajes mas accionables que el default)
# -----------------------------------------------------------------------------
jakarta.validation.constraints.NotNull.message            = is required
jakarta.validation.constraints.NotBlank.message           = must not be blank
jakarta.validation.constraints.NotEmpty.message           = must not be empty
jakarta.validation.constraints.Null.message               = must be null
jakarta.validation.constraints.AssertTrue.message         = must be true
jakarta.validation.constraints.AssertFalse.message        = must be false

jakarta.validation.constraints.Email.message              = must be a valid email address
jakarta.validation.constraints.Pattern.message            = does not match the expected format
jakarta.validation.constraints.Digits.message             = invalid number format (max {integer} integer and {fraction} fraction digits)

jakarta.validation.constraints.Size.message               = size must be between {min} and {max}
jakarta.validation.constraints.Min.message                = must be greater than or equal to {value}
jakarta.validation.constraints.Max.message                = must be less than or equal to {value}
jakarta.validation.constraints.DecimalMin.message         = must be greater than {value}
jakarta.validation.constraints.DecimalMax.message         = must be less than {value}
jakarta.validation.constraints.Positive.message           = must be a positive value
jakarta.validation.constraints.PositiveOrZero.message     = must be zero or a positive value
jakarta.validation.constraints.Negative.message           = must be a negative value
jakarta.validation.constraints.NegativeOrZero.message     = must be zero or a negative value

jakarta.validation.constraints.Past.message               = must be a past date
jakarta.validation.constraints.PastOrPresent.message      = must be today or a past date
jakarta.validation.constraints.Future.message             = must be a future date
jakarta.validation.constraints.FutureOrPresent.message    = must be today or a future date

# -----------------------------------------------------------------------------
# EduShift - constraints custom
# -----------------------------------------------------------------------------
edushift.validation.StrongPassword.message = must be {minLength}-{maxLength} chars and include upper case, lower case, digit and a special character
edushift.validation.PhoneNumber.message    = must be a valid international phone number (E.164: optional +, 7-15 digits, first digit non-zero)
edushift.validation.TenantSlug.message     = must be 3-50 chars: lowercase letters, digits or hyphens, not starting/ending with a hyphen
edushift.validation.Username.message       = must be 3-30 chars starting with a letter or digit; only letters, digits, dot, underscore or hyphen
edushift.validation.SafeText.message       = must not contain HTML tags, NUL or control characters
edushift.validation.ValidUuid.message      = must be a valid UUID
edushift.validation.EnumValue.message      = must be one of: {values}
edushift.validation.ValidEmail.message     = must be a valid email address
edushift.validation.ValidPassword.message  = must be a strong password (8-72 chars with upper, lower, digit and special character)
