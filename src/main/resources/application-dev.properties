# =============================================================================
# EduShift - perfil desarrollo
# PostgreSQL local o contenedor; pool pequeño y SQL logging opcional
# =============================================================================

# -----------------------------------------------------------------------------
# PostgreSQL - datasource (variables de entorno con defaults locales)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edushift}?currentSchema=${DB_SCHEMA:edushift}&sslmode=${DB_SSL_MODE:disable}&ApplicationName=${DB_APPLICATION_NAME:edushift-back-dev}&options=-c%20TimeZone%3DUTC
spring.datasource.username=${DB_USER:edushift}
spring.datasource.password=${DB_PASSWORD:edushift}

# -----------------------------------------------------------------------------
# HikariCP - optimizado para desarrollo (arranque rápido, pocos recursos)
# -----------------------------------------------------------------------------
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.keepalive-time=${HIKARI_KEEPALIVE_TIME:120000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION:60000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:10000}

# -----------------------------------------------------------------------------
# JPA - logging SQL opcional (SQL_LOGGING_ENABLED=true|false, default true)
# -----------------------------------------------------------------------------
spring.jpa.show-sql=${SQL_LOGGING_ENABLED:true}
spring.jpa.properties.hibernate.format_sql=${SQL_LOGGING_ENABLED:true}
spring.jpa.properties.hibernate.highlight_sql=${SQL_LOGGING_ENABLED:true}
spring.jpa.properties.hibernate.use_sql_comments=${SQL_LOGGING_ENABLED:true}

logging.level.org.hibernate.SQL=${SQL_LOGGING_LEVEL:DEBUG}
logging.level.org.hibernate.orm.jdbc.bind=${SQL_BIND_LOGGING_LEVEL:TRACE}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${SQL_BIND_LOGGING_LEVEL:TRACE}
logging.level.com.zaxxer.hikari=${HIKARI_LOG_LEVEL:INFO}
logging.level.com.edushift=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

# -----------------------------------------------------------------------------
# Flyway - desarrollo (clean deshabilitado por defecto; ver FLYWAY_CLEAN_DISABLED)
# -----------------------------------------------------------------------------
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:true}
spring.flyway.clean-on-validation-error=false
logging.level.org.flywaydb=${FLYWAY_LOG_LEVEL:DEBUG}

# -----------------------------------------------------------------------------
# Redis - desarrollo
# -----------------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=false
spring.data.redis.lettuce.pool.max-active=8

logging.level.io.lettuce.core=${REDIS_LOG_LEVEL:INFO}

# -----------------------------------------------------------------------------
# Aplicación / Frontend / CORS (dev)
# -----------------------------------------------------------------------------
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4200}
# Tunnel origins for mobile/QA testing (devtunnels, ngrok, cloudflared, localtunnel).
# Wildcard patterns are required because the host prefix is random per session.
# Only enabled in dev — application-prod.properties leaves this empty.
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.devtunnels.ms,https://*.ngrok-free.app,https://*.ngrok.io,https://*.ngrok.app,https://*.ngrok.dev,https://*.trycloudflare.com,https://*.loca.lt,https://*.lhr.life}

# -----------------------------------------------------------------------------
# Seguridad / JWT (dev)
# El secreto puede sobreescribirse con JWT_SECRET. El default es OBVIAMENTE
# inseguro (a propósito) y solo aplica en perfil dev local: nunca debe llegar
# a staging/prod (application-prod.properties NO tiene default).
# Mínimo 32 chars para HS256.
# -----------------------------------------------------------------------------
app.security.jwt.secret=${JWT_SECRET:dev-only-edushift-jwt-secret-change-me-in-prod-2026}

# -----------------------------------------------------------------------------
# Integraciones (dev) - apagadas por defecto
# -----------------------------------------------------------------------------
app.integrations.openrouter.enabled=${OPENROUTER_ENABLED:false}
app.integrations.firebase.enabled=${FIREBASE_ENABLED:false}

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management.endpoint.health.show-details=always
