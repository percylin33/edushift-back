# =============================================================================
# EduShift - integration test profile
# Activated by `@ActiveProfiles("test")` on integration test classes.
#
# Datasource coordinates are NOT defined here — they are injected at runtime
# by Spring Boot's @ServiceConnection magic from the PostgreSQLContainer
# declared in IntegrationTest. The container is fresh per test-class run, so
# Flyway always builds the schema from V0 → V_n.
#
# Redis is disabled wholesale because the auth integration tests do not
# exercise caching, and bringing up a Redis container per test class would
# triple the startup latency.
# =============================================================================

# -----------------------------------------------------------------------------
# JWT — pinned secret for predictable signing across IT runs.
# Length must be ≥ 32 bytes (HS256 minimum) — JwtServiceImpl enforces this
# in @PostConstruct and would fail-fast if shorter.
# This is intentionally NOT a real secret; it is committed because
# integration tests need a deterministic key. Production loads
# JWT_SECRET from the environment.
# -----------------------------------------------------------------------------
app.security.jwt.secret=integration-test-secret-which-is-at-least-32-bytes-long-padding-padding

# -----------------------------------------------------------------------------
# Hibernate — quieter than dev so CI logs stay readable.
# -----------------------------------------------------------------------------
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.edushift=INFO
logging.level.org.springframework.security=WARN

# -----------------------------------------------------------------------------
# Cache / Redis — Redis disabled in IT, cache downgraded to a no-op.
#
# Important: we MUST NOT exclude CacheAutoConfiguration. EduShiftApplication
# is annotated with @EnableCaching, which requires a CacheManager bean to
# exist at boot. With `spring.cache.type=none` Spring auto-registers a
# NoOpCacheManager — calls to @Cacheable methods become passthrough lookups,
# which is exactly the behavior we want in IT.
#
# The first attempt at this file excluded CacheAutoConfiguration too;
# the context refused to start with:
#   "No qualifying bean of type 'org.springframework.cache.CacheManager'
#    available: ... register a CacheManager bean or remove the @EnableCaching"
# (captured in target/surefire-reports/TEST-AuthTenantIsolationIT.xml).
#
# Redis itself stays excluded — there is no Redis container in IT, and
# leaving Lettuce auto-configured triggers a connection attempt at startup.
# -----------------------------------------------------------------------------
spring.cache.type=none
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
edushift.redis.enabled=false
management.health.redis.enabled=false

# -----------------------------------------------------------------------------
# HikariCP — minimum pool for fast IT bring-up; leak detection off.
# -----------------------------------------------------------------------------
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.leak-detection-threshold=0
spring.datasource.hikari.connection-timeout=30000

# -----------------------------------------------------------------------------
# CORS — empty in IT (no browser involved).
# -----------------------------------------------------------------------------
app.cors.allowed-origins=

# -----------------------------------------------------------------------------
# Server — keep the production context-path (/api) for IT.
#
# `application.properties` defaults to `server.servlet.context-path=/api`
# (the gateway prefix in front of the JAR when deployed behind nginx). We
# KEEP it for IT so:
#   1. Spring Security's PUBLIC_PATHS matchers (which are written WITHOUT
#      the /api prefix, see SecurityConfig) match exactly as in production.
#   2. The controller @RequestMapping values also line up with the post-
#      context-path URI, so a request to `/v1/auth/login` reaches the
#      AuthController.
#
# Tests that hit the API via TestRestTemplate MUST pass paths WITHOUT the
# `/api` prefix — `TestRestTemplate.getRootUri()` already includes it, so
# the final URL becomes `http://localhost:${port}/api/v1/...` exactly once.
#
# (This is the standard Spring Boot pattern; see
#  https://docs.spring.io/spring-boot/docs/1.5.2.REFERENCE/html/boot-features-testing.html#boot-features-testing-spring-boot-applications-with-mockmvc
#  and the TestRestTemplate root-uri behavior.)
# -----------------------------------------------------------------------------
# server.servlet.context-path left as default (/api) intentionally.

# -----------------------------------------------------------------------------
# Audit retention job — DISABLED in IT (Sprint 11 / BE-11.6).
# The job would otherwise run on a daily cron and purge rows mid-test,
# producing non-deterministic counts. The `enabled=false` guard inside
# AuditRetentionJob is a belt-and-braces check; this property is the
# primary off-switch.
# -----------------------------------------------------------------------------
app.audit.retention-enabled=false
